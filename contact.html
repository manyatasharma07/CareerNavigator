<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact Me</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>

body{
    font-family:'Poppins', sans-serif;
    background: linear-gradient(135deg,#0f2027,#2c5364);
    color:white;
    text-align:center;
    padding:40px;
}

h1{
    margin-bottom:10px;
}

.subtitle{
    color:#cfd8dc;
    margin-bottom:30px;
}

/* Card */

.contact-box{
    max-width:500px;
    margin:auto;
    background:rgba(255,255,255,0.1);
    padding:25px;
    border-radius:15px;
    backdrop-filter: blur(10px);
    border:1px solid rgba(255,255,255,0.2);
}

/* Info */

.info{
    margin-bottom:20px;
}

/* Button */

.btn-form{
    background:#00c6ff;
    border:none;
    padding:10px;
    width:100%;
    font-weight:bold;
}

.btn-form:hover{
    background:#009ec3;
}

/* Social */

.social i{
    font-size:22px;
    margin:10px;
    cursor:pointer;
    transition:0.3s;
}

.social i:hover{
    transform:scale(1.2);
}

/* Back button */

.btn-back{
    margin-top:30px;
}

</style>

</head>

<body>

<h1>📩 Contact Me</h1>
<p class="subtitle">Feel free to reach out!</p>

<div class="contact-box">

    <div class="info">
        <h4>👤 Manyata Sharma</h4>
        <p>📧 manyata@gmail.com</p>
        <p>🎓 Student at IIPS, DAVV</p>
    </div>

    <!-- Google Form Button -->
    <a href="https://docs.google.com/forms/d/e/1FAIpQLSeX4Mkqi55EoBX6YqwxhOTf4pzms1OjYkxua7BGnRsxcuF-0A/viewform?usp=dialog" target="_blank" class="btn btn-form">
        Open Contact Form 🚀
    </a>

</div>

<!-- Social Links -->

<div class="social">
    <a href="#"><i class="fa-brands fa-github"></i></a>
    <a href="#"><i class="fa-brands fa-linkedin"></i></a>
    <a href="#"><i class="fa-brands fa-instagram"></i></a>
</div>

<a href="careers.html" class="btn btn-light btn-back">
← Back to Careers
</a>

</body>
</html>
